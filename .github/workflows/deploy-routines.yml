---
name: Deploy routines

on:
  push:
    branches: [main]
    paths:
      - 'routines/**.prompt.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-routines
  cancel-in-progress: false

jobs:
  deploy:
    name: Push prompt changes to Anthropic Routines API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >-
            Read .github/workflows/deploy-routines.prompt.md and follow
            every instruction in it.
          claude_args: >-
            --allowedTools "Read,Glob,RemoteTrigger"
            --max-turns 40
            --model sonnet
