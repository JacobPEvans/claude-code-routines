---
name: Deploy routines

on:
  push:
    branches: [main]
    paths:
      - 'routines/**.prompt.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-routines
  cancel-in-progress: false

jobs:
  deploy:
    name: Push prompt changes to Anthropic Routines API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            For every file matching `routines/*.prompt.md` in this
            checkout:

            1. Read the file. Parse the YAML frontmatter for
               `trigger_id`, `model`, and `allowed_tools`.
            2. Extract the body below the closing `---` of the
               frontmatter — call it BODY.
            3. Call the `RemoteTrigger` tool with `action: update`,
               the file's `trigger_id`, and this body shape:

               ```
               {
                 "job_config": {
                   "ccr": {
                     "events": [{
                       "data": {
                         "message": {
                           "content": <BODY>,
                           "role": "user"
                         },
                         "type": "user"
                       }
                     }],
                     "session_context": {
                       "allowed_tools": <from frontmatter>,
                       "model": <from frontmatter>
                     }
                   }
                 }
               }
               ```

            4. Verify by calling `RemoteTrigger` `action: get` for the
               same `trigger_id` and confirming the returned
               `job_config.ccr.events[0].data.message.content` equals
               BODY exactly.

            Print one `PASS <basename>` or `FAIL <basename> — <reason>`
            line per file. Exit non-zero if any FAIL.

            Do not modify this repository.
          claude_args: >-
            --allowedTools "Read,Glob,RemoteTrigger"
            --max-turns 40
            --model claude-sonnet-4-6
